    <div class="p-4 max-w-4xl mx-auto bg-[#202020] bg-dark-overlay rounded-xl" style="border-style: ridge; border-color: #332C17; border-width: 6px;">
        <div class="border-t-2 border-b-2 border-[#EEBF5F] p-4">
            <h1 class="morpheus text-4xl font-semibold tracking-widest text-[#EEBF5F] text-center p-2 text-shadow-wow">

            <h2 class="text-center text-2xl text-[#6EA66F] ArialN text-shadow-lg" id="timer"></h2>
        </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-4 mb-[5rem]">
            
            <div class=" p-4 px-5 rounded-xl text-center">
                <div class="border-b-4 border-[#DA6D2F]">

                    <p class="text-xl text-gray-400 mb-2 ArialN text-shadow-md">x0.76</p>

                <div class="mt-2">

                    <span id="res2" class="absolute bottom-10 left-[50%] translate-x-[-50%] morpheus tracking-widest text-shadow-wow text-[#DA6D2F] text-4xl">0</span>
                    <span class="absolute bottom-0 left-[50%] translate-x-[-50%] text-2xl ArialN text-shadow-lg tracking-wide text-[#6A6142]">PTS/WEEK</span>
                </div>
            </div>
            <div class=" p-4 px-5 rounded-xl text-center">

                    <span class="absolute bottom-0 left-[50%] translate-x-[-50%] text-2xl ArialN text-shadow-lg tracking-wide text-[#6A6142]">PTS/WEEK</span>
                </div>
            </div>
            <div class=" p-4 px-5 rounded-xl text-center">
                <div class="border-b-4 border-[#5BBA5B]">
                    <h2 class=" morpheus text-[#5BBA5B] font-bold text-3xl tracking-wider text-shadow-wow">5v5</h2>
                    <p class="text-xl text-gray-400 mb-2 ArialN text-shadow-md">x1.00</p>
                </div>
                <div class="mt-2">

                    <span id="res5" class="absolute bottom-10 left-[50%] translate-x-[-50%] morpheus tracking-widest text-shadow-wow text-[#5BBA5B] text-4xl">0</span>

                </div>
            </div>
            </div>

        <div class="footer border-t-2 border-[#EEBF5F] p-4">

                    YOU RECEIVE:
                    <span class="ml-4 best morpheus tracking-widest text-shadow-wow text-[#EEBF5F] text-3xl" id="best">0</span>
                </p>
                <button id="refresh"
                class="ml-auto px-5 py-0 text-2xl font-bold text-[#EEBF5F] ArialN text-shadow-wow-small cursor-pointer

                Refresh
                </button>
            </div>
            <div class="ArialN text-shadow-md text-[#6A6142] text-xl">
